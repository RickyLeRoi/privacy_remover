version: "3.9"
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      # 20260701 RG - Bind su loopback: il servizio non va esposto in rete.
      # Per raggiungerlo dalla LAN usare "3000:3000" (vedi docker-compose.vm.yml).
      - "127.0.0.1:3000:3000"
    volumes:
      # 20260701 RG - Il file SQLite vive qui: senza questo volume i dati si
      # perdono a ogni ricreazione del container.
      - dbdata:/app/data
      - ./evidence:/app/evidence

volumes:
  dbdata:

# 20260701 RG - Per HTTPS su LAN/Tailscale serve un servizio caddy che faccia
# reverse proxy su app:3000, togliendo il mapping 'ports' qui sopra. Vedi Caddyfile.
