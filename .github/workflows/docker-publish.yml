name: Publish Docker image

# 20260714 RG - docker-compose.vm.yml fa `image: ghcr.io/rickyleroi/privacy_remover:latest`
# ma nessuno pubblicava quell'immagine: questo workflow è ciò che la produce. Ogni push
# su main aggiorna :latest; un tag v* pubblica anche l'immagine versionata.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Senza questo il push su GHCR viene rifiutato con 403: il GITHUB_TOKEN di
      # default è in sola lettura sui packages.
      packages: write

    steps:
      - uses: actions/checkout@v5

      # QEMU serve solo per la build arm64. Se un giorno la VM è solo amd64, si può
      # togliere questo step (e arm64 da `platforms`) e la build dimezza i tempi.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 20260714 RG - metadata-action normalizza il nome in minuscolo: GHCR rifiuta
      # le maiuscole, e il repo è "RickyLeRoi/privacy_remover".
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
